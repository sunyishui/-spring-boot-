server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/survey_system?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: YourSuperSecretKeyForJwtTokenGenerationMustBeLongEnough2024SurveySys
  expiration: 86400000

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

# 通义千问 DashScope AI配置
ai:
  dashscope:
    api-key: your-dashscope-api-key-here
    model: qwen-turbo
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
